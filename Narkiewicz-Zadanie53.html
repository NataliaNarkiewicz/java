<div style="font-size:30px;">
<script>

let ile_razy_nar = prompt("Ile razy powtórzyć napis =", "");
ile_razy_nar = parseInt(ile_razy_nar);


let inicjaly_nar = prompt("Podaj swoje inicjały =", "");


for (let i_nar = 1; i_nar <= ile_razy_nar; i_nar++) {


    for (let k_nar = 1; k_nar <= i_nar; k_nar++) {
        document.write("&nbsp");
    }


    document.write(i_nar + "_" + inicjaly_nar + "_" + i_nar + "<br>");
}
</script>
