
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Z39 Narkiewicz</title>
</head>
<body>
 
<h3><font color="green">MENU:</font></h3>
<p><font color="red">1 - CZERWONY</font></p>
<p><font color="blue">2 - NIEBIESKI</font></p>
 
<script>
 
var opcja_dana_nar;
opcja_dana_nar = prompt("Podaj kolor (1/2 lub nazwa):");
opcja_dana_nar = opcja_dana_nar.toLowerCase();
 
if(opcja_dana_nar == "1" || opcja_dana_nar == "czerwony")
{
document.write("<font color='red' size='7'>Wczytałeś kolor czerwony</font>");
}
else if(opcja_dana_nar == "2" || opcja_dana_nar == "niebieski")
{
document.write("<font color='blue' size='1'>Wczytałeś kolor niebieski</font>");
}
 
</script>
 
<!-- Narkiewicz Z39 -->
</body>
</html>
