<!DOCTYPE html>
<html lang="pl">
<head>
 <meta charset="UTF-8">
 <title>Narkiewicz Z39_JS</title>
</head>
<body>

<!-- MENU -->
<h2 style="color:green;">MENU:</h2>
<div style="color:red; font-size:22px;">1 - CZERWONY</div>
<div style="color:blue; font-size:22px;">2 - NIEBIESKI</div>
<br>

<!-- Pole + przycisk jak na obrazku -->
<input type="text" id="pole_nark" placeholder="Wpisz 1, 2 lub kolor">
<input type="button" value="Sprawdź" onclick="fun_nar()">

<script>
function fun_nar() {

    var opcja_dana_nar = document.getElementById("pole_nark").value;
    opcja_dana_nar = opcja_dana_nar.toLowerCase();

    if(opcja_dana_nar == "1" || opcja_dana_nar == "czerwony") {
        document.write('<h1 style="color:red; font-size:50px;">wczytałeś kolor czerwony</h1><br />');
    }
    else if(opcja_dana_nar == "2" || opcja_dana_nar == "niebieski") {
        document.write('<h6 style="color:blue; font-size:20px;">wczytałeś kolor niebieski</h6><br />');
    }
    else {
        document.write('<h2 style="color:black;">Nie rozpoznano koloru</h2>');
    }
}
</script>

</body>
</html>
<!-- Narkiewicz Z39_JS -->
