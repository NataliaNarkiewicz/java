<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suma harmoniczna</title>
</head>
<body>
 
<div style="color:red; font-size:50px;">
 
<script language="JavaScript">
 
let suma_nar = 0;
 
for (let k = 1; k <= 1000000; k++) {
    suma_nar = suma_nar + 1 / k;
}
 
document.write("suma = " + suma_nar.toFixed(2) + "<br>");
 
</script>
 
</div>
 
</body>
