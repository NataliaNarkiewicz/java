<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>Zadanie 59 – Natalia Narkiewicz</title>
</head>
<body>

<script>

let nr_nar = 19; 

for (let i_nar = nr_nar; i_nar <= nr_nar + 15; i_nar++) {

    let pierw2_nar = Math.sqrt(i_nar);
    let pierw4_nar = Math.sqrt(pierw2_nar);

    document.write(
        "i=" + i_nar +
        " pierw_2(" + i_nar + ")=" + pierw2_nar.toFixed(2) +
        " pierw_4(" + i_nar + ")=" + pierw4_nar.toFixed(2) + "<br>"
    );

    if ((i_nar - nr_nar + 1) % 3 === 0) {
        document.write("<br>");
    }
}

</script>
