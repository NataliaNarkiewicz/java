    <!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Narkiewicz Z35_JS</title>
</head>
<body>

<div style="color:red;font-size:50px;">
<script language="JavaScript">

var x = prompt("Natalia Narkiewicz  – podaj liczbę x = ","");
var a_dana_nar = parseFloat(x);

document.write("Czytana liczba x = " + a_dana_nar + "<br>");

if(a_dana_nar > 0)
{
    document.write("Liczba jest większa od 0<br>");
}

if(a_dana_nar == 0)
{
    document.write("Liczba jest równa 0<br>");
}

if(a_dana_nar < 0)
{
    document.write("Liczba jest mniejsza od 0<br>");
}

</script>
</div>

</body>
</html>
