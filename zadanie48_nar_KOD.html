<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>Zadanie 50 – Narkiewicz</title>
</head>
<body>

<div style="color:red; font-size:40px;">
<script>

let suma_nar = 0;

let i_nar = 1;

do {
    suma_nar = suma_nar + 1 / i_nar;
    i_nar++;
} while (i_nar <= 1000000);

document.write("Suma szeregu harmonicznego od 1 do 1 000 000 = " + suma_nar.toFixed(6));

</script>
