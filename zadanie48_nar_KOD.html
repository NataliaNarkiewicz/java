<body>

<h2>Kod programu:</h2>

<pre style="font-size:18px; color:black;">
&lt;script&gt;
let suma_nar = 0;
let i_nar = 1;

do {
    suma_nar = suma_nar + 1 / i_nar;
    i_nar++;
} while (i_nar &lt;= 1000000);

document.write("Suma szeregu harmonicznego od 1 do 1 000 000 = " + suma_nar.toFixed(6));
&lt;/script&gt;
</pre>

</body>
