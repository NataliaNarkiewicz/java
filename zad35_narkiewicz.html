<!DOCTYPE html>

<meta charset="UTF-8">
<title>Z35 Narkiewicz</title>
</head>
<body>
 
<script>
 
var a_dana_nar;
a_dana_nar = prompt("Podaj liczbę:");
 
if(a_dana_nar > 0)
{
document.write("Liczba jest dodatnia");
}
else if(a_dana_nar == 0)
{
document.write("Liczba jest równa zero");
}
else
{
document.write("Liczba jest ujemna");
}
 
</script>
